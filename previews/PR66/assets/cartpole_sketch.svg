<svg width="350" height="250" viewBox="0 0 350 250" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="white"/>
  
  <!-- Rail -->
  <line x1="30" y1="180" x2="320" y2="180" stroke="#666" stroke-width="3"/>
  
  <!-- Cart wheels -->
  <circle cx="130" cy="188" r="8" fill="#888"/>
  <circle cx="170" cy="188" r="8" fill="#888"/>
  
  <!-- Cart body -->
  <rect x="120" y="160" width="60" height="25" rx="3" fill="#4a90d9" stroke="#2c5f8a" stroke-width="2"/>
  
  <!-- Pendulum rod -->
  <line x1="150" y1="160" x2="150" y2="80" stroke="#333" stroke-width="3"/>
  
  <!-- Pendulum bob -->
  <circle cx="150" cy="80" r="12" fill="#dc3c3c" stroke="#8a1a1a" stroke-width="2"/>
  
  <!-- Angle θ annotation -->
  <path d="M 150 160 L 150 140" stroke="#666" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="155" y="145" font-family="Arial, sans-serif" font-size="14" fill="#666">θ</text>
  
  <!-- Force u arrow -->
  <line x1="180" y1="172" x2="220" y2="172" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="200" y="165" font-family="Arial, sans-serif" font-size="12" fill="#e74c3c" text-anchor="middle">u</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
  </defs>
  
  <!-- Labels -->
  <text x="150" y="220" font-family="Arial, sans-serif" font-size="12" fill="#333" text-anchor="middle">x</text>
  <text x="150" y="240" font-family="Arial, sans-serif" font-size="12" fill="#666" text-anchor="middle">rail</text>
</svg>
